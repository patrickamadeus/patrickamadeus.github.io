main:
  - year: 2026
    title: "LinguDistill: Recovering Linguistic Ability in Vision Language Models via Selective Cross-Modal Distillation"
    authors: <strong>Patrick Amadeus Irawan</strong>, Elang Fuadi, Satendra Kumar, Alham Fikri Aji, Yova Kementchedjhieva
    conference_short: Preprint
    conference: Preprint, 2026.
