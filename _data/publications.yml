  - year: 2026
    title: "Vision Language Models are Confused Tourists"
    authors: <strong>Patrick Amadeus Irawan</strong>, Ikhlasul Akmal Hanif, Muhammad Dehan Al Kautsar, Genta Indra Winata, Fajri Koto, Alham Fikri Aji
    conference_short: CVPR 2026 Findings
